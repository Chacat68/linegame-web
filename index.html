<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际贸易帝国 · 银河历 3045</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="game-shell">

  <!-- ================================================================
       Header
  ================================================================ -->
  <header id="game-header">
    <div class="hdr-title">
      <h1>⭐ 星际贸易帝国</h1>
      <span class="subtitle">银河历 3045 年</span>
    </div>

    <div id="player-stats">
      <div class="stat-block">
        <span class="stat-label">信用积分</span>
        <span id="credits" class="stat-value stat-credits">1,000</span>
      </div>
      <div class="stat-block">
        <span class="stat-label">净资产</span>
        <span id="net-worth" class="stat-value stat-networth">1,000</span>
      </div>
      <div class="stat-block">
        <span class="stat-label">银河历</span>
        <span id="galactic-day" class="stat-value stat-day">第 1 天</span>
      </div>
    </div>

    <div id="empire-bar-wrap" title="商业帝国进度">
      <span style="font-size:11px;color:#9090b0">帝国进度</span>
      <div id="empire-track">
        <div id="empire-progress"></div>
      </div>
      <span id="empire-pct" style="font-size:11px;color:#aaa">0%</span>
    </div>

    <div id="player-level" class="player-level-bar"></div>
  </header>

  <!-- ================================================================
       Main
  ================================================================ -->
  <main id="game-main">

    <!-- Star Map ---------------------------------------------------- -->
    <section id="map-section">
      <div id="map-container">
        <canvas id="webgl-canvas"></canvas>
        <canvas id="map-canvas"></canvas>
        <button id="galaxy-view-btn" class="galaxy-toggle-btn">🌌 星系总览</button>
      </div>

      <div id="map-legend">
        <span><span class="legend-dot" style="background:#4CAF50"></span>农业</span>
        <span><span class="legend-dot" style="background:#2196F3"></span>科技</span>
        <span><span class="legend-dot" style="background:#FF9800"></span>矿业</span>
        <span><span class="legend-dot" style="background:#E91E63"></span>军事</span>
        <span><span class="legend-dot" style="background:#9C27B0"></span>商业</span>
        <span><span class="legend-dot" style="background:#00BCD4"></span>医疗</span>
        <span><span class="legend-dot" style="background:#607D8B"></span>特殊</span>
        <span style="margin-left:auto;color:#9090b0;font-size:11px">点击星系前往 · 悬停查看燃料消耗</span>
      </div>
    </section>

    <!-- Trade Panel ------------------------------------------------- -->
    <aside id="trade-panel">

      <!-- Location -->
      <div id="location-bar">
        <div id="current-location">📍 太阳主星</div>
        <div id="location-desc">银河系农业中心，粮食丰产之地</div>
      </div>

      <!-- Ship mini-stats -->
      <div id="ship-mini">
        <div class="mini-bar-wrap">
          <div class="mini-bar-label">
            <span>货舱</span>
            <span id="cargo-text">0 / 20</span>
          </div>
          <div class="mini-bar-track"><div id="cargo-fill" class="mini-bar-fill"></div></div>
        </div>
        <div class="mini-bar-wrap">
          <div class="mini-bar-label">
            <span>燃料</span>
            <span id="fuel-text">100 / 100</span>
          </div>
          <div class="mini-bar-track"><div id="fuel-fill" class="mini-bar-fill"></div></div>
        </div>
        <div class="mini-bar-wrap">
          <div class="mini-bar-label">
            <span>船体</span>
            <span id="hull-text">100 / 100</span>
          </div>
          <div class="mini-bar-track"><div id="hull-fill" class="mini-bar-fill hull-fill"></div></div>
        </div>
      </div>

      <!-- Tabs -->
      <nav class="tabs">
        <button class="tab-btn active" data-tab="tab-market">🏪 市场</button>
        <button class="tab-btn"        data-tab="tab-cargo">📦 货舱</button>
        <button class="tab-btn"        data-tab="tab-upgrades">⚙️ 升级</button>
        <button class="tab-btn"        data-tab="tab-research">🔬 科技</button>
        <button class="tab-btn"        data-tab="tab-faction">🏛️ 派系</button>
        <button class="tab-btn"        data-tab="tab-quest">📋 任务</button>
        <button class="tab-btn"        data-tab="tab-fleet">🚢 船队</button>
        <button class="tab-btn"        data-tab="tab-achievement">🏆 成就</button>
        <button class="tab-btn"        data-tab="tab-save">💾 存档</button>
      </nav>

      <div class="tab-content">

        <!-- Market tab -->
        <div id="tab-market" class="tab-pane active">
          <div id="auto-trade-controls">
            <button id="auto-trade-btn" class="btn-auto-trade">🤖 自动贸易</button>
            <span id="auto-trade-status" class="auto-trade-status"></span>
          </div>
          <table id="market-table">
            <thead>
              <tr>
                <th>商品</th>
                <th>买入</th>
                <th>卖出</th>
                <th>持有</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="market-tbody"></tbody>
          </table>
        </div>

        <!-- Cargo tab -->
        <div id="tab-cargo" class="tab-pane">
          <div id="cargo-list"></div>
        </div>

        <!-- Upgrades tab -->
        <div id="tab-upgrades" class="tab-pane">
          <div id="upgrade-list"></div>
        </div>

        <!-- Research tab (群星风格科技树) -->
        <div id="tab-research" class="tab-pane">
          <div id="research-status"></div>
          <div id="research-options"></div>
          <div id="research-completed"></div>
        </div>

        <!-- Faction tab (派系外交) -->
        <div id="tab-faction" class="tab-pane">
          <div id="faction-list"></div>
        </div>

        <!-- Quest tab (任务系统) -->
        <div id="tab-quest" class="tab-pane">
          <div id="quest-list"></div>
        </div>

        <!-- Fleet tab (船队系统) -->
        <div id="tab-fleet" class="tab-pane">
          <div id="fleet-list"></div>
        </div>

        <!-- Achievement tab (成就系统) -->
        <div id="tab-achievement" class="tab-pane">
          <div id="achievement-list"></div>
        </div>

        <!-- Save tab (存读档) -->
        <div id="tab-save" class="tab-pane">
          <div id="save-list"></div>
        </div>

      </div><!-- /tab-content -->
    </aside>

  </main>

  <!-- ================================================================
       Status bar
  ================================================================ -->
  <footer id="status-bar">
    <div id="message-log"></div>
  </footer>

</div><!-- /game-shell -->

<!-- ================================================================
     Trade modal
================================================================ -->
<div id="trade-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <h3 id="modal-title">交易</h3>
    <p  id="modal-desc"></p>
    <div class="modal-stepper">
      <button id="modal-decrease" aria-label="减少数量">−</button>
      <input  id="modal-amount" type="number" min="1" value="1" aria-label="交易数量" />
      <button id="modal-increase" aria-label="增加数量">+</button>
    </div>
    <button id="modal-all" class="btn-all">全部</button>
    <div id="modal-total"></div>
    <div class="modal-actions">
      <button id="modal-confirm" class="btn-primary">确认</button>
      <button id="modal-cancel"  class="btn-secondary">取消</button>
    </div>
  </div>
</div>

<!-- ================================================================
     Event modal (群星风格随机事件)
================================================================ -->
<div id="event-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-box event-modal-box">
    <div class="event-header">
      <span id="event-icon" class="event-icon-large"></span>
      <h3 id="event-title">事件</h3>
    </div>
    <p id="event-desc" class="event-description"></p>
    <div id="event-choices" class="event-choices"></div>
  </div>
</div>

<!-- ================================================================
     Game-over / Victory modal
================================================================ -->
<div id="gameover-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-box" style="text-align:center">
    <h2 id="gameover-title">游戏结束</h2>
    <p  id="gameover-message"></p>
    <button id="restart-btn" class="btn-primary" style="margin-top:12px">重新开始</button>
  </div>
</div>

<!-- ================================================================
     Dispatch modal (派遣贸易路线配置)
================================================================ -->
<div id="dispatch-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <h3 id="dispatch-title">📡 派遣贸易</h3>
    <div class="dispatch-form">
      <label class="dispatch-label">买入星系
        <select id="dispatch-buy-system" class="dispatch-select"></select>
      </label>
      <label class="dispatch-label">卖出星系
        <select id="dispatch-sell-system" class="dispatch-select"></select>
      </label>
      <label class="dispatch-label">贸易商品
        <select id="dispatch-good" class="dispatch-select"></select>
      </label>
    </div>
    <div id="dispatch-estimate" class="dispatch-estimate"></div>
    <div class="modal-actions">
      <button id="dispatch-confirm" class="btn-primary">确认派遣</button>
      <button id="dispatch-cancel" class="btn-secondary">取消</button>
    </div>
  </div>
</div>

<!-- ================================================================
     Tutorial: 新手引导遮罩 & 提示框
================================================================ -->
<div id="tutorial-overlay" class="hidden"></div>
<div id="tutorial-tooltip" class="tutorial-tooltip hidden"></div>

<!-- ================================================================
     Tutorial: 首次启动弹窗
================================================================ -->
<div id="tutorial-start-modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="tut-start-title">⭐ 欢迎，星际贸易商！</div>
    <p class="tut-start-desc">
      这似乎是你第一次来到银河系。<br>
      要先了解一下星际贸易的基础吗？
    </p>
    <div class="tut-start-actions">
      <button id="tut-start-yes" class="tut-btn tut-btn-primary">🚀 开始新手教程</button>
      <button id="tut-start-no" class="tut-btn tut-btn-secondary">我是老手，直接开始</button>
    </div>
    <div class="tut-start-hint">教程约 2 分钟，可随时跳过</div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
